# config.yaml
# Central config — all scripts read from here

mlflow:
  tracking_uri: "/app/mlruns"
  experiment_name: "fraud-detection"
  registered_model_name: "fraud_detector"

data:
  raw_path: "data/raw/creditcard.csv"
  processed_dir: "data/processed"
  test_size: 0.2
  random_state: 42
  smote_strategy: 0.1

model:
  type: "xgboost"
  threshold: 0.5
  save_dir: "models"

training:
  optuna_trials: 50
  cv_folds: 5
  scoring: "average_precision"

monitoring:
  drift_check_frequency: "weekly"
  reference_data_path: "data/processed/X_train_sm.npy"