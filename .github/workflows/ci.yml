name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Run all tests ─────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feature pipeline tests
        run: pytest tests/test_features.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Run training tests
        run: pytest tests/test_train.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Run registry tests
        run: pytest tests/test_registry.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Full test suite with coverage
        run: |
          pytest tests/ --cov=src --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Build Docker image ────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test              # only runs if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:latest
            ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image build summary
        run: |
          echo "Docker image pushed:"
          echo "  ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:latest"
          echo "  ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:${{ github.sha }}"

  # ── Job 3: Security scan ─────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "0"           # don't fail build, just report
          format: "table"