name: Weekly Drift Monitor

on:
  schedule:
    - cron: "0 0 * * 1"   # Every Monday at 00:00 UTC
  workflow_dispatch:

jobs:
  drift:
    name: Run drift report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check processed data exists
        id: check_data
        run: |
          if [ -f "data/processed/X_train_sm.npy" ] && [ -f "data/processed/X_test_scaled.npy" ]; then
            echo "data_exists=true" >> $GITHUB_OUTPUT
          else
            echo "data_exists=false" >> $GITHUB_OUTPUT
            echo "Processed data not found — skipping drift report."
            echo "To enable: commit data/processed/*.npy or set up DVC/S3 pull."
          fi

      - name: Run drift monitor
        if: steps.check_data.outputs.data_exists == 'true'
        run: python src/monitor.py --threshold 0.5

      - name: Upload drift report
        if: always() && steps.check_data.outputs.data_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: reports/drift_report.html
          retention-days: 30
