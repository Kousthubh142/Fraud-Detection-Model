

services:

  # ── Fraud Detection API ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=/app/mlruns
    volumes:
      - ./mlruns:/app/mlruns     # mount mlruns so model updates reflect live
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ── MLflow UI ────────────────────────────────────────────────────────────
  mlflow:
    image: python:3.12-slim
    container_name: fraud-mlflow
    working_dir: /app
    ports:
      - "5001:5001"              # 5001 to avoid clash with local mlflow
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      sh -c "pip install mlflow -q &&
             mlflow ui --host 0.0.0.0 --port 5001
             --backend-store-uri /app/mlruns"
    restart: unless-stopped

networks:
  default:
    name: fraud-network